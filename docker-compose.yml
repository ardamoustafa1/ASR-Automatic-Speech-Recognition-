services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-asr_pro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asr_user} -d ${POSTGRES_DB:-asr_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./asr_pro:/app/asr_pro
      - ./data:/app/data
    environment:
      - ASR_JWT_SECRET_KEY=${ASR_JWT_SECRET_KEY:?ASR_JWT_SECRET_KEY must be set in .env}
      - ASR_DATABASE_URL=postgresql://${POSTGRES_USER:-asr_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-asr_pro}
      - ASR_CORS_ORIGINS=${ASR_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - ASR_ADMIN_PASSWORD=${ASR_ADMIN_PASSWORD:?ASR_ADMIN_PASSWORD must be set in .env}
      - ASR_REDIS_URL=${ASR_REDIS_URL:-}
      - ASR_WEBHOOK_URL=${ASR_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn asr_pro.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  asr_core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./tools:/app/tools
      - ./asr_pro:/app/asr_pro
      - ./temp_audio_uploads:/app/temp_audio_uploads
      - ./batch_audio_files:/app/batch_audio_files
    environment:
      - ASR_DATABASE_URL=postgresql://${POSTGRES_USER:-asr_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-asr_pro}
      - ASR_JWT_SECRET_KEY=${ASR_JWT_SECRET_KEY:?ASR_JWT_SECRET_KEY must be set in .env}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: streamlit run tools/legacy_streamlit/ASR/ASR.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped

  command_center:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - with-redis

volumes:
  postgres_data:
