name: ASR-Pro Develop Branch CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  fast-check:
    name: ⚡ Fast Lint & Test
    runs-on: ubuntu-latest
    env:
      ASR_JWT_SECRET_KEY: ci_test_secret_key_at_least_32_characters_long
      ASR_ADMIN_PASSWORD: ci_test_admin_password
      ASR_TEST_NO_MODEL: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff isort

      - name: Ruff lint
        run: ruff check .

      - name: isort check
        run: isort --check-only asr_pro/ tests/

      - name: Run tests (no coverage threshold on develop)
        run: pytest tests/ -x -q

  frontend-check:
    name: 🎨 Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

