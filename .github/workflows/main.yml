name: ASR-Pro Enterprise CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Lint & Security Scan ─────────────────────────────────────────
  lint-and-scan:
    name: 🔍 Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linting & audit tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit isort

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Import order check (isort)
        run: isort --check-only asr_pro/ tests/

      - name: Security scan (Bandit)
        run: bandit -r asr_pro/ ASR/ -ll

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt || echo "⚠️ Audit found issues — review manually."

  # ─── Job 2: Backend Tests ─────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-scan
    env:
      ASR_JWT_SECRET_KEY: ci_test_secret_key_at_least_32_characters_long
      ASR_ADMIN_PASSWORD: ci_test_admin_password
      ASR_TEST_NO_MODEL: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=asr_pro --cov-report=xml --cov-report=term-missing --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Job 3: Frontend Tests & Build ───────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Tests & Build
    runs-on: ubuntu-latest
    needs: lint-and-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Run frontend tests
        run: npm run test --if-present

      - name: Build production bundle (verify no build errors)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

  # ─── Job 4: Docker Build & Push ───────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/asr-pro-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/asr-pro-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/asr-pro-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/asr-pro-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
