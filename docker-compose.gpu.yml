# GPU override for production deployments:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Prerequisites on the host:
#   - NVIDIA driver + NVIDIA Container Toolkit (nvidia-ctk runtime configure)
#   - For Blackwell GPUs (B100/B200/GB200, RTX 50-series): NVIDIA driver
#     >=570.x (CUDA 12.8 support) - Dockerfile.backend.gpu's CUDA_TAG build
#     arg must also be >=12.8.x, see the comment there.
#
# With a GPU, ASRService auto-selects device=cuda and probes CTranslate2
# compute types (float16 -> int8_float16 -> int8) at model-load time via
# _compute_type_fallback_chain(), logging which one actually loaded -
# faster-whisper decodes large-v3 at roughly RTF 0.05-0.10 on float16, the
# throughput a bank/operator contact center needs (hundreds of calls per GPU
# per hour). On Blackwell, no compute type here is confirmed as using
# architecture-specific kernels - check the loaded model's log line and your
# installed ctranslate2 release notes to know what's actually running.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend.gpu
    volumes:
      - ./asr_pro:/app/asr_pro
      - ./data:/app/data
      # Persist downloaded model weights across container restarts.
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend.gpu
    volumes:
      - ./asr_pro:/app/asr_pro
      - ./data:/app/data
      - ./temp_audio_uploads:/app/temp_audio_uploads
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
