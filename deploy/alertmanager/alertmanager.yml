route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # Placeholder receiver: logs alerts to Alertmanager's own console/API instead of
  # paging anyone. Point this at a real channel before relying on it in production:
  #
  #   receivers:
  #     - name: default
  #       slack_configs:
  #         - api_url: "https://hooks.slack.com/services/T000/B000/XXXX"
  #           channel: "#asr-pro-alerts"
  #
  # or an equivalent `pagerduty_configs` / `webhook_configs` block. See
  # https://prometheus.io/docs/alerting/latest/configuration/#receiver
  - name: default
