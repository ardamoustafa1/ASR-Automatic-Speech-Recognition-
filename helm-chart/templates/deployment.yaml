apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asr-pro.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "asr-pro.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "asr-pro.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "asr-pro.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ASR_DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            - name: ASR_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "asr-pro.fullname" . }}-secrets
                  key: jwt-secret
            - name: ASR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "asr-pro.fullname" . }}-secrets
                  key: admin-password
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

