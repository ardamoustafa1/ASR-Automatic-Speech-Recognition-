{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: asr-redis
  labels:
    app: asr-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: asr-redis
{{- end -}}

