apiVersion: v1
kind: Service
metadata:
  name: {{ include "asr-pro.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "asr-pro.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "asr-pro.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

