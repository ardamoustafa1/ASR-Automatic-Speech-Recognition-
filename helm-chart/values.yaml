replicaCount: 2

image:
  repository: ardamoustafa/asr-pro-backend
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 8000

env:
  databaseUrl: "postgresql://user:password@asr-db:5432/asr_pro"
  redisUrl: "redis://asr-redis:6379/0"

secrets:
  jwtKey: ""
  adminPassword: ""

# Runs asr_pro.worker: consumes the RQ "asr-pro" queue for audio transcription/NLP
# jobs so this heavy CPU work scales independently of the request-serving api pods.
worker:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 3000m
      memory: 6Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    # CPU-based scaling is a reasonable default; for scaling on actual queue
    # backlog instead, consider KEDA with a Redis list-length trigger.
    targetCPUUtilizationPercentage: 75

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ardamoustafa/asr-pro-frontend
    tag: "1.0.0"
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: asr.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend:
            serviceName: asr-pro-backend
            servicePort: 8000
        - path: /
          pathType: Prefix
          backend:
            serviceName: asr-pro-frontend
            servicePort: 80
  tls:
    - secretName: asr-tls-secret
      hosts:
        - asr.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
